<!doctype html><html><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#eaf0fb;
    background:#070b16;position:relative;padding:74px}
  body::before{content:"";position:absolute;inset:0;
    background:radial-gradient(700px 500px at 10% -10%,rgba(77,141,255,.28),transparent 60%),
      radial-gradient(700px 500px at 100% 10%,rgba(167,139,250,.24),transparent 60%),
      radial-gradient(700px 500px at 80% 120%,rgba(45,212,191,.18),transparent 60%)}
  .wrap{position:relative;height:100%;display:flex;flex-direction:column;justify-content:center}
  .ey{font-family:ui-monospace,monospace;letter-spacing:.24em;text-transform:uppercase;color:#2dd4bf;font-size:20px;font-weight:600}
  h1{font-size:108px;font-weight:850;letter-spacing:-.04em;margin:18px 0 6px;line-height:1}
  .grad{background:linear-gradient(100deg,#4d8dff,#a78bfa 46%,#2dd4bf);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:30px;color:#9fb0cc;max-width:880px;margin-top:6px}
  .sig{margin-top:38px;border-left:5px solid #4d8dff;padding-left:22px;font-size:27px;font-weight:600;line-height:1.5}
  .sig .b{background:linear-gradient(100deg,#fb9444,#f472b6 60%,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand{position:absolute;bottom:0;left:0;display:flex;align-items:center;gap:14px;font-size:24px;font-weight:700}
  .dot{width:34px;height:34px;border-radius:10px;background:linear-gradient(100deg,#4d8dff,#a78bfa,#2dd4bf)}
  .url{position:absolute;bottom:4px;right:0;font-family:ui-monospace,monospace;color:#6f7e9b;font-size:22px}
</style></head><body><div class="wrap">
  <div class="ey">A prospective benchmark framework &middot; Public v1.0</div>
  <h1>Target<span class="grad">Space</span></h1>
  <div class="sub">Benchmarking personal intelligence by target-specific forecasting under partial observation.</div>
  <div class="sig">Beyond population priors. Beyond the target's own routine.<br><span class="b">Calibrated skill that collapses on the wrong target.</span></div>
  <div class="brand"><span class="dot"></span> TargetSpace</div>
  <div class="url">targetspace.org</div>
</div></body></html>
